<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:layout name="Module" />

<f:section name="Content">
    <f:asset.module identifier="@hn/agent/new-task-element.js" />
    <h1><f:translate key="LLL:EXT:agent/Resources/Private/Language/locallang.xlf:index.heading" /></h1>

    <hn-agent-new-task action-uri="{newUri}" page="{pageId}" placeholder="{f:translate(key:'LLL:EXT:agent/Resources/Private/Language/locallang.xlf:placeholder.default')}"></hn-agent-new-task>

    <f:if condition="{tasks}">
        <f:then>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Status</th>
                        <th>Updated</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <f:for each="{tasks}" as="task">
                        <tr>
                            <td>{task.title}</td>
                            <td>
                                <f:switch expression="{task.status}">
                                    <f:case value="0"><span class="badge badge-warning"><f:translate key="LLL:EXT:agent/Resources/Private/Language/locallang.xlf:status.pending" /></span></f:case>
                                    <f:case value="1"><span class="badge badge-info"><f:translate key="LLL:EXT:agent/Resources/Private/Language/locallang.xlf:status.inProgress" /></span></f:case>
                                    <f:case value="2"><span class="badge badge-success"><f:translate key="LLL:EXT:agent/Resources/Private/Language/locallang.xlf:status.ended" /></span></f:case>
                                    <f:case value="3"><span class="badge badge-danger"><f:translate key="LLL:EXT:agent/Resources/Private/Language/locallang.xlf:status.failed" /></span></f:case>
                                </f:switch>
                            </td>
                            <td><f:format.date format="Y-m-d H:i">@{task.tstamp}</f:format.date></td>
                            <td>
                                <a href="{f:be.uri(route:'ai_agent_chat.show', parameters:'{task:task.uid, id:pageId}')}"
                                   class="btn btn-sm btn-default">Open</a>
                            </td>
                        </tr>
                    </f:for>
                </tbody>
            </table>
        </f:then>
        <f:else>
            <f:if condition="{pageId}">
                <p class="text-muted"><f:translate key="LLL:EXT:agent/Resources/Private/Language/locallang.xlf:index.empty" /></p>
            </f:if>
        </f:else>
    </f:if>
</f:section>
</html>
