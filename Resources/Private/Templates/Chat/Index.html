<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:layout name="Module"/>

<f:section name="Content">

    <f:asset.module identifier="@hn/agent/new-task-element.js"/>
    <hn-agent-new-task action-uri="{newUri}"
                       table="pages"
                       uid="{pageId}"
                       placeholder="{placeholder}"
                       workspace-id="{workspace.id}"
                       workspace-title="{workspace.title}">
    </hn-agent-new-task>
    <h1>
        <f:translate key="LLL:EXT:agent/Resources/Private/Language/locallang.xlf:index.heading"/>
    </h1>


    <f:if condition="{tasks}">
        <f:then>
            <h2>
                <f:translate key="LLL:EXT:agent/Resources/Private/Language/locallang.xlf:index.section.current"/>
            </h2>
            <f:render partial="TaskTable" arguments="{tasks: tasks, pageId: pageId}"/>
        </f:then>
        <f:else>
            <p class="text-muted">
                <f:translate key="LLL:EXT:agent/Resources/Private/Language/locallang.xlf:index.empty"/>
            </p>
        </f:else>
    </f:if>

    <f:if condition="{subpageGroups}">
        <h2>
            <f:translate key="LLL:EXT:agent/Resources/Private/Language/locallang.xlf:index.section.subpages"/>
        </h2>
        <f:for each="{subpageGroups}" as="group">
            <f:render partial="TaskTable"
                      arguments="{tasks: group.tasks, pageId: group.pid, title: group.pageTitle, pageUri: group.pageUri}"/>
        </f:for>
    </f:if>
</f:section>
</html>
