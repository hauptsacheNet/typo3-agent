<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:layout name="Module" />

<f:section name="Content">
    <h1>AI Chat</h1>

    <f:if condition="{pageId}">
        <f:then>
            <form action="{newUri}" method="post" class="mb-4">
                <div class="input-group">
                    <input type="text"
                           name="message"
                           class="form-control"
                           placeholder="Start a new chat — type your first message…"
                           autofocus
                           required>
                    <button type="submit" class="btn btn-primary">New Chat</button>
                </div>
            </form>
        </f:then>
        <f:else>
            <div class="callout callout-info mb-4">
                <div class="callout-body">Please select a page in the page tree to start a new chat.</div>
            </div>
        </f:else>
    </f:if>

    <f:if condition="{chats}">
        <f:then>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Status</th>
                        <th>Updated</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <f:for each="{chats}" as="chat">
                        <tr>
                            <td>{chat.title}</td>
                            <td>
                                <f:switch expression="{chat.status}">
                                    <f:case value="0"><span class="badge badge-warning">Pending</span></f:case>
                                    <f:case value="1"><span class="badge badge-info">In Progress</span></f:case>
                                    <f:case value="2"><span class="badge badge-success">Ended</span></f:case>
                                    <f:case value="3"><span class="badge badge-danger">Failed</span></f:case>
                                </f:switch>
                            </td>
                            <td><f:format.date format="Y-m-d H:i">@{chat.tstamp}</f:format.date></td>
                            <td>
                                <a href="{f:be.uri(route:'ai_agent_chat.show', parameters:'{task:chat.uid, id:pageId}')}"
                                   class="btn btn-sm btn-default">Open</a>
                            </td>
                        </tr>
                    </f:for>
                </tbody>
            </table>
        </f:then>
        <f:else>
            <f:if condition="{pageId}">
                <p class="text-muted">No chats yet on this page. Start one above.</p>
            </f:if>
        </f:else>
    </f:if>
</f:section>
</html>
