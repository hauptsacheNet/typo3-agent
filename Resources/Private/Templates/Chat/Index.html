<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:layout name="Module"/>

<f:section name="Content">

    <f:asset.module identifier="@hn/agent/new-task-element.js"/>
    <f:asset.module identifier="@hn/agent/instruction-content-modal.js"/>
    <f:asset.module identifier="@hn/agent/user-filter.js"/>
    <f:asset.module identifier="@typo3/backend/recordlist.js"/>
    <f:asset.css identifier="hn-agent-chat" href="EXT:agent/Resources/Public/Css/agent-chat.css"/>
    <hn-agent-new-task action-uri="{newUri}"
                       table="pages"
                       uid="{pageId}"
                       placeholder="{placeholder}"
                       workspace-id="{workspace.id}"
                       workspace-title="{workspace.title}">
    </hn-agent-new-task>
    <h1>
        <f:translate key="LLL:EXT:agent/Resources/Private/Language/locallang.xlf:index.heading"/>
    </h1>

    <f:render partial="Instructions" arguments="{
        instructions: instructions,
        canEditInstructions: canEditInstructions,
        newInstructionUri: newInstructionUri,
        identifier: 'agent-instructions',
        collapsed: collapsed.instructions,
        isLiveWorkspace: isLiveWorkspace
    }"/>


    <f:if condition="{isAdmin} && {taskCreators}">
        <div class="mb-3" style="max-width: 20rem;">
            <label for="agent-filter-user" class="form-label">
                <f:translate key="LLL:EXT:agent/Resources/Private/Language/locallang.xlf:index.filter.user.label"/>
            </label>
            <select id="agent-filter-user" class="form-select" data-agent-user-filter>
                <option value="0">
                    <f:translate key="LLL:EXT:agent/Resources/Private/Language/locallang.xlf:index.filter.user.all"/>
                </option>
                <f:for each="{taskCreators}" as="creator">
                    <option value="{creator.uid}"
                            {f:if(condition: '{creator.uid} == {filterUserId}', then: 'selected="selected"')}>
                        <f:if condition="{creator.realName}">
                            <f:then>{creator.realName} ({creator.username})</f:then>
                            <f:else>{creator.username}</f:else>
                        </f:if>
                    </option>
                </f:for>
            </select>
        </div>
    </f:if>

    <f:if condition="{tasks}">
        <f:then>
            <f:render partial="TaskTable" arguments="{
                tasks: tasks,
                pageId: pageId,
                showUser: isAdmin,
                identifier: 'agent-tasks-current',
                headingLabel: 'LLL:EXT:agent/Resources/Private/Language/locallang.xlf:index.section.current',
                collapsed: collapsed.current
            }"/>
        </f:then>
        <f:else>
            <p class="text-muted">
                <f:translate key="LLL:EXT:agent/Resources/Private/Language/locallang.xlf:index.empty"/>
            </p>
        </f:else>
    </f:if>

    <f:if condition="{subpageTasks}">
        <f:render partial="TaskTable" arguments="{
            tasks: subpageTasks,
            pageId: pageId,
            showPage: 1,
            showUser: isAdmin,
            identifier: 'agent-tasks-subpages',
            headingLabel: 'LLL:EXT:agent/Resources/Private/Language/locallang.xlf:index.section.subpages',
            collapsed: collapsed.subpages
        }"/>
    </f:if>
</f:section>
</html>
