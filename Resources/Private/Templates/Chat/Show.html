<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers/"
      data-namespace-typo3-fluid="true">
<f:layout name="SplitModule"/>

<f:section name="Content">
    <f:asset.module identifier="@hn/agent/chat-element.js"/>
    <f:asset.module identifier="@hn/agent/workspace-changes.js"/>
    <f:asset.module identifier="@hn/agent/page-tree-refresh.js"/>
    <f:asset.css identifier="hn-agent-chat" href="EXT:agent/Resources/Public/Css/agent-chat.css"/>

    <hn-agent-chat
            send-uri="{sendUri}"
            stream-uri="{streamUri}"
            cancel-uri="{cancelUri}"
            auto-start="{f:if(condition: isNewTask, then: '1', else: '0')}"
            initial-prompt="{task.prompt}"
            initial-messages="{messages -> f:format.json()}"
            task-workspace-id="{taskWorkspace.id}"
            task-workspace-title="{taskWorkspace.title}"
            active-workspace-id="{activeWorkspace.id}"
            active-workspace-title="{activeWorkspace.title}"
            default-upload-folder="{defaultUploadFolder}"
            file-browser-uri="{fileBrowserUri}"
            preflight-uri="{preflightUri}"
    ></hn-agent-chat>

</f:section>


<f:section name="Footer">
    <div class="hn-typo3-agent__footer">

        <details id="workspace-drawer" class="hn-typo3-agent__workspace_drawer hn-workspace-drawer">
            <summary class="hn-workspace-drawer__header">
            <span class="hn-workspace-drawer__title">
                Workspace changes<span class="hn-workspace-drawer__count hidden"> (<span
                    class="hn-workspace-drawer__count-value">0</span>)</span>
            </span>
                <span class="hn-workspace-drawer__toggle" aria-hidden="true">
                <typo3-backend-icon identifier="actions-chevron-up" size="small"></typo3-backend-icon>
            </span>
            </summary>
            <div class="hn-workspace-drawer__body">
                <div id="workspace-panel">
                    <div id="workspace-content-wrapper" data-task-uid="{task.uid}">
                        <div class="row workspace-actions multi-record-selection-actions-wrapper gx-0 hidden">
                            <div class="col-auto">
                                <div class="row row-cols-auto align-items-center gx-2 t3js-multi-record-selection-actions hidden">
                                    <div class="col">
                                        <strong>
                                            <f:translate
                                                    key="LLL:EXT:core/Resources/Private/Language/locallang_core.xlf:labels.selection"/>
                                        </strong>
                                    </div>
                                    <div class="col">
                                        <select name="selection-action" class="form-select form-select-sm">
                                            <option value="">
                                                <f:translate
                                                        key="LLL:EXT:workspaces/Resources/Private/Language/locallang.xlf:chooseSelectionAction"/>
                                            </option>
                                            <option value="publish">
                                                <f:translate
                                                        key="LLL:EXT:workspaces/Resources/Private/Language/locallang.xlf:label_doaction_publish"/>
                                            </option>
                                            <option value="discard">
                                                <f:translate
                                                        key="LLL:EXT:workspaces/Resources/Private/Language/locallang.xlf:label_doaction_discard"/>
                                            </option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div id="workspace-contents" style="display: none">
                            <typo3-workspaces-record-table></typo3-workspaces-record-table>
                        </div>
                        <div id="workspace-contents-empty">
                            <f:be.infobox
                                    message="{f:translate(key:'LLL:EXT:workspaces/Resources/Private/Language/locallang.xlf:noResults')}"
                                    state="{f:constant(name: 'TYPO3\CMS\Fluid\ViewHelpers\Be\InfoboxViewHelper::STATE_NOTICE')}"
                            />
                        </div>
                        <nav id="workspace-pagination" class="mt-3"></nav>
                    </div>
                </div>
            </div>
        </details>
    </div>
</f:section>
</html>
