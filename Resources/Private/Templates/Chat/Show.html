<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:layout name="Module" />

<f:section name="Content">
    <f:asset.module identifier="@hn/agent/chat-element.js" />

    <h1>{task.title}</h1>

    <hn-agent-chat
        send-uri="{sendUri}"
        stream-uri="{streamUri}"
        auto-start="{f:if(condition: isNewTask, then: '1', else: '0')}"
        initial-prompt="{task.prompt}"
        initial-messages="{messages -> f:format.json()}"
    ></hn-agent-chat>
</f:section>
</html>
