    <html
        xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
        xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers/"
        xmlns:agent="http://typo3.org/ns/Hn/Agent/ViewHelpers"
        data-namespace-typo3-fluid="true"
>

<f:asset.css identifier="hn-split-module" href="EXT:agent/Resources/Public/Css/SplitModule.css"/>
<agent:typo3VersionBelow major="14">
    <f:asset.css identifier="hn-split-module-v13" href="EXT:agent/Resources/Public/Css/SplitModuleV13.css"/>
</agent:typo3VersionBelow>

<f:render section="Before" arguments="{_all}" optional="true"/>

<div class="module module-layout-{moduleLayout} {moduleClass} module-layout--split"
     data-module-id="{moduleId}"
     data-module-name="{moduleName}">

    <f:if condition="{formTag}">
        <f:then>
            <f:format.raw>{formTag}</f:format.raw>
        </f:then>
    </f:if>

    <f:if condition="{docHeader.enabled}">
        <f:render partial="DocHeader" arguments="{docHeader:docHeader}"/>
    </f:if>

    <div class="module-body t3js-module-body">
        <div class="module-body-container t3js-module-body-container">
            <f:if condition="{uiBlock}">
                <div id="t3js-ui-block"
                     class="ui-block">
                    <core:icon identifier="spinner-circle" size="large"/>
                </div>
            </f:if>

            <f:render section="Content" arguments="{_all}" optional="true"/>
        </div>
    </div>

    <div class="module-footer">
        <div class="module-footer-container">
            <f:render section="Footer" arguments="{_all}" optional="true"/>
        </div>
    </div>
</div>

<f:if condition="{formTag}">
    <f:then>
        </form>
    </f:then>
</f:if>
</div>

<f:render section="After" arguments="{_all}" optional="true"/>

</html>
